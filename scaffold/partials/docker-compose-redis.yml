  # ---------------------------------------------------------------------------
  # Redis — Cache and session store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    profiles: ["core", "all"]
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
